name: Rebuild on Content Change

on:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    name: Rebuild and Redeploy Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log webhook trigger
        run: |
          echo "🔔 Webhook triggered from: ${{ github.event.client_payload.repository }}"
          echo "📝 Event: ${{ github.event.client_payload.event_type }}"
          echo "👤 Triggered by: ${{ github.event.client_payload.sender }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Fetch essays from private repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER_NAME: ${{ secrets.GH_USER_NAME }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: yarn fetch-essays

      - name: Build website
        run: yarn build:docusaurus

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          user_name: 'Tanya Jain'
          user_email: 'tanyaacjain@github.com'
          commit_message: 'Rebuild from content update: ${{ github.event.client_payload.repository }}'

      - name: Notify completion
        run: echo "✨ Website rebuilt and deployed successfully!"
